function colorForProspect(p) { return COLORS[p] || '#999'; }
function sizeForValue(v) { return Math.max(5, Math.min(15, 5 + v * 2)); }

function addMarker(lat, lon, data, type) {
  const color = colorForProspect(data.prospect);
  const icon = L.circleMarker([lat, lon], {
    radius: type === 'rock' ? 8 : sizeForValue(data.au),
    fillColor: color, color: '#111', weight: 1.5, opacity: 0.8, fillOpacity: 0.7
  });
  
  let popupText = `<b>${type.toUpperCase()}</b><br>
    <span class="pop-val">${data.au} ppb</span><br>
    <span class="pop-sub">${data.id}</span><br>
    <span class="pop-sub">${data.prospect}</span>`;
  
  if(type === 'rock' && data.type) popupText += `<br><span class="pop-sub">${data.type}</span>`;
  if(data.au_detail) popupText += `<br><span class="pop-sub">${data.au_detail}</span>`;
  
  icon.bindPopup(popupText).addTo(map);
}

RAW.stream.forEach(d => addMarker(d.lat, d.lon, d, 'stream'));
RAW.soil.forEach(d => addMarker(d.lat, d.lon, d, 'soil'));
RAW.rock.forEach(d => addMarker(d.lat, d.lon, d, 'rock'));

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `<h4>Prospect</h4>${Object.keys(COLORS).map(p => 
    `<div class="lrow"><div class="ldot" style="background:${COLORS[p]}"></div><span>${p}</span></div>`
  ).join('')}`;
  return div;
};
legend.addTo(map);

// Stats
const stats = L.control({ position: 'topleft' });
stats.onAdd = () => {
  const div = L.DomUtil.create('div', 'ctrl-panel');
  div.innerHTML = `<h4>Dataset Summary</h4>
    <div style="margin:6px 0"><span>${RAW.stream.length}</span> stream sed</div>
    <div style="margin:6px 0"><span>${RAW.soil.length}</span> soil samples</div>
    <div style="margin:6px 0"><span>${RAW.rock.length}</span> rock chips</div>
    <div style="margin:6px 0">Max: <span>${Math.max(...RAW.stream.map(d => d.au)).toFixed(2)}</span> ppb</div>`;
  return div;
};
stats.addTo(map);
</script>
</body>
</html>
